version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      # Groups all production dependencies (stuff in 'dependencies')
      production-dependencies:
        dependency-type: "production"
      # Groups all development dependencies (stuff in 'devDependencies')
      development-dependencies:
        dependency-type: "development"
    open-pull-requests-limit: 5
    reviewers:
      - chitrank2050
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
